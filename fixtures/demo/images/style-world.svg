<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic saved style reference portrait</title>
  <desc id="desc">A faceless editorial silhouette in warm tailored clothing, framed by sunlit stone arches and olive branches.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#f3dfbf"/><stop offset=".52" stop-color="#d8b58b"/><stop offset="1" stop-color="#9b7759"/>
    </linearGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#d7b27f"/><stop offset=".52" stop-color="#ad7a4d"/><stop offset="1" stop-color="#73503a"/>
    </linearGradient>
    <linearGradient id="trouser" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#eee2cd"/><stop offset="1" stop-color="#c9b89d"/>
    </linearGradient>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#4e3527" flood-opacity=".24"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono"><feFuncA type="table" tableValues="0 .055"/></feComponentTransfer>
    </filter>
  </defs>

