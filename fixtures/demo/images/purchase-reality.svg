<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic shopping history portrait</title>
  <desc id="desc">A faceless figure in a charcoal hoodie and cobalt sneakers, carrying a practical black tote in a cool city setting.</desc>
  <defs>
    <linearGradient id="city" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#dce3e4"/><stop offset=".58" stop-color="#9ba7a9"/><stop offset="1" stop-color="#647276"/>
    </linearGradient>
    <linearGradient id="hoodie" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7d8586"/><stop offset=".52" stop-color="#535d60"/><stop offset="1" stop-color="#30393c"/>
    </linearGradient>
    <linearGradient id="denim" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#34444a"/><stop offset="1" stop-color="#1e2b30"/>
    </linearGradient>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#1f292c" flood-opacity=".28"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".68" numOctaves="2" seed="11" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono"><feFuncA type="table" tableValues="0 .05"/></feComponentTransfer>
    </filter>
  </defs>

  <rect width="1000" height="1400" fill="url(#city)"/>
