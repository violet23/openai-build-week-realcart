    <path d="M370 552 228 906l76 33 145-297M667 552l128 354-76 33-131-297" fill="none" stroke="#586366" stroke-width="62" stroke-linecap="round"/>
    <path d="M379 1018h147l-36 292H314zm147 0h151l107 292H596z" fill="url(#denim)"/>
    <path d="M309 1302h191l-9 47H286z" fill="#ecf0ef"/>
    <path d="M586 1300h206l42 49H578z" fill="#f1f3f1"/>
