  <path d="M102 802h130v92H102z" fill="#465256" opacity=".55"/>
  <circle cx="166" cy="848" r="23" fill="#9eaaab" opacity=".7"/>
  <rect width="1000" height="1400" filter="url(#grain)" opacity=".42"/>
</svg>
