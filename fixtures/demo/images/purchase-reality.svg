  <path d="M74 1160h188M778 1082h180" stroke="#d8ddda" stroke-width="19" stroke-linecap="round" opacity=".7"/>

  <ellipse cx="518" cy="1280" rx="258" ry="58" fill="#263337" opacity=".25"/>
  <g filter="url(#soft-shadow)">
    <circle cx="520" cy="349" r="83" fill="#596568"/>
    <path d="M444 335c13-86 119-116 163-34-22-18-52-29-87-29-30 0-56 19-76 63" fill="#323c3f"/>
    <path d="M427 422c-102 66-148 257-113 600h408c28-345-13-534-111-600-28 55-57 82-92 82-34 0-66-27-92-82" fill="url(#hoodie)"/>
