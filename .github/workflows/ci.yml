name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml
      - name: Install backend
        run: pip install -e 'services/api[dev]'
      - name: Lint
        run: ruff check services/api
      - name: Type check
        run: mypy services/api/src
      - name: Test
        run: pytest services/api/tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: Install frontend
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --dir apps/web lint
      - name: Type check
        run: pnpm --dir apps/web typecheck
      - name: Test
        run: pnpm --dir apps/web test
      - name: Build
        run: pnpm --dir apps/web build
